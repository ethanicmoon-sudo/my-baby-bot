<html lang="en">

  <head>

      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>AI Agent Command Center (Myanmar)</title>    
    <!-- Myanmar Font Support for Cyberpunk Dashboard -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;500;700&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />

    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Myanmar:wght@400;500;600;700&display=swap" rel="stylesheet" />

      /* Neon glow effect for cyberpunk aesthetic */
      @keyframes neon-glow {

      }
      body {
        font-family: 'Roboto Mono', 'Noto Sans Myanmar', monospace;
      }
    </style>
