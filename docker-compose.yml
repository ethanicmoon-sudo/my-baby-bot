version: "3.9"

services:
  api:
    build: .
    environment:
      NODE_ENV: production
      PORT: 3000
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8080}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      VITE_APP_ID: ${VITE_APP_ID}
      DB_STRATEGY: postgres
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-change_me}
      OAUTH_SERVER_URL: ${OAUTH_SERVER_URL:-}
      OWNER_OPEN_ID: ${OWNER_OPEN_ID:-}
      BUILT_IN_FORGE_API_URL: ${BUILT_IN_FORGE_API_URL:-}
      BUILT_IN_FORGE_API_KEY: ${BUILT_IN_FORGE_API_KEY:-}
      BINANCE_WITHDRAWALS_ENABLED: ${BINANCE_WITHDRAWALS_ENABLED:-false}
      BINANCE_API_BASE_URL: ${BINANCE_API_BASE_URL:-https://api.binance.com}
      BINANCE_API_KEY: ${BINANCE_API_KEY:-}
      BINANCE_API_SECRET: ${BINANCE_API_SECRET:-}
      BINANCE_ALLOWED_WITHDRAWAL_ADDRESSES: ${BINANCE_ALLOWED_WITHDRAWAL_ADDRESSES:-}
      BINANCE_MAX_WITHDRAW_AMOUNT: ${BINANCE_MAX_WITHDRAW_AMOUNT:-100}
      BINANCE_RECV_WINDOW: ${BINANCE_RECV_WINDOW:-5000}
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - api
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
